version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: voting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-voting}
      POSTGRES_PASSWORD: ${PGPASSWORD:-password}
      POSTGRES_DB: ${PGDATABASE:-votingdb}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: voting-ganache
    restart: unless-stopped
    command: [ "--host", "0.0.0.0", "--port", "8545", "--accounts", "10", "--defaultBalanceEther", "1000", "--chainId", "1337" ]
    ports:
      - "8545:8545"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 4000
      ETH_RPC_URL: http://ganache:8545
      CONTRACT_NETWORK: ganache
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-voting}
      PGPASSWORD: ${PGPASSWORD:-password}
      PGDATABASE: ${PGDATABASE:-votingdb}
      ADMIN_PRIVATE_KEY: ${ADMIN_PRIVATE_KEY}
      VOTER_PRIVATE_KEY: ${VOTER_PRIVATE_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
    ports:
      - "4000:4000"
    volumes:
      - ./contracts/deployments:/app/contracts/deployments:ro
    depends_on:
      - postgres
      - ganache

volumes:
  postgres-data:


